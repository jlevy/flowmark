# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    # Use ["main", "master"] for CI only on the default branch.
    # Use ["**"] for CI on all branches.
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # Update this as needed:

        # Common platforms: ["ubuntu-latest", "macos-latest", "windows-latest"]
        os: ["ubuntu-latest"]
        python-version: ["3.10","3.11", "3.12", "3.13", "3.14"]

    # Linux only by default. Use ${{ matrix.os }} for other OSes.
    runs-on: ${{ matrix.os }}

    env:
      # 14-day install cool-off for any resolution in CI (e.g. the pinned pip-audit
      # tool below). The friendly duration needs uv >= 0.9 (we pin a newer uv).
      # `uv sync --frozen` does not re-resolve, so this is belt-and-suspenders for it.
      # NOTE: deliberately NOT setting UV_NO_BUILD — it blocks building the editable
      # local package and breaks `uv sync`. See SUPPLY-CHAIN-SECURITY.md.
      UV_EXCLUDE_NEWER: "14 days"

    steps:
      # Generally following uv docs:
      # https://docs.astral.sh/uv/guides/integration/github/

      - name: Checkout (official GitHub action)
        uses: actions/checkout@v4
        with:
          # Important for versioning plugins:
          fetch-depth: 0

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@v5
        with:
          # Update this as needed:
          version: "0.11.13"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      # Alternately can use the official Python action:
      # - name: Set up Python (using actions/setup-python)
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ matrix.python-version }}

      - name: Install all dependencies
        # --frozen: install exactly from uv.lock, never re-resolving in CI.
        # See SUPPLY-CHAIN-SECURITY.md.
        run: uv sync --all-extras --frozen

      - name: Run linting
        run: uv run python devtools/lint.py

      - name: Run tests
        run: uv run pytest

      - name: Audit dependencies (pip-audit)
        # Audit the locked deps with a pinned, isolated pip-audit so the scanner's own
        # (large) transitive tree never enters uv.lock or our cool-off/audit surface.
        # See SUPPLY-CHAIN-SECURITY.md and upstream guidelines/hardening-pypi.md.
        # Non-blocking for now; flip continue-on-error to false once the advisory
        # backlog is cleared.
        continue-on-error: true
        run: |
          uv export --frozen --no-emit-project --all-extras --format requirements-txt > /tmp/reqs.txt
          uvx --from "pip-audit==2.10.0" pip-audit -r /tmp/reqs.txt

      - name: Check golden coverage
        run: bash scripts/check-golden-coverage.sh

      - name: Run golden tests
        run: npx tryscript@0.1.7 run tests/tryscript/*.tryscript.md
